services:
  postgres:
    image: postgres:16-alpine
    container_name: aiweb_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aiweb_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aiweb_migrate
    restart: "no"
    env_file: .env
    environment:
      SERVICE_ROLE: migrate
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      MODEL_PATH: ${MODEL_PATH}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_store:/models
    networks:
      - backend_net

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aiweb_api
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_ROLE: api
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      MODEL_PATH: ${MODEL_PATH}
      API_PORT: ${API_PORT}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_store:/models
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health').read()\""]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aiweb_worker
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE_ROLE: worker
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LOG_LEVEL: ${LOG_LEVEL}
      MODEL_PATH: ${MODEL_PATH}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_store:/models
    networks:
      - backend_net

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    container_name: aiweb_ui
    restart: unless-stopped
    env_file: .env
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL}
      UI_PORT: ${UI_PORT}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/').read()\""]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: aiweb_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend_net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: aiweb_prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - frontend_net
      - backend_net
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: aiweb_grafana
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - frontend_net

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  model_store:
  prometheus_data:
  grafana_data:
